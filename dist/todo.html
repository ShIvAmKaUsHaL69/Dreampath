<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Simple Todo App</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    /* ══════════════════════════════════════════
       Design Tokens (Frontend Ekarigar)
       ══════════════════════════════════════════ */
    :root {
      --font-sans: 'Plus Jakarta Sans', system-ui, sans-serif;
      
      --text-xs: 0.75rem;
      --text-sm: 0.875rem;
      --text-base: 1rem;
      --text-lg: 1.125rem;
      --text-xl: 1.25rem;
      --text-2xl: 1.5rem;
      
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      
      --background: #faf9f7;
      --foreground: #1c1917;
      --card: #ffffff;
      --muted: #f5f5f4;
      --muted-foreground: #78716c;
      --primary: #0d9488;
      --primary-foreground: #ffffff;
      --accent: #f59e0b;
      --success: #22c55e;
      --destructive: #ef4444;
      --border: #e7e5e4;
      --radius: 0.75rem;
      --radius-sm: 0.5rem;
      
      /* Animation curves */
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
      --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
    }

    /* ══════════════════════════════════════════
       Reset & Base
       ══════════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: var(--space-6);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════════════════════════
       App Container
       ══════════════════════════════════════════ */
    .app {
      width: 100%;
      max-width: 480px;
      margin-top: var(--space-8);
    }

    /* ══════════════════════════════════════════
       Header with Stagger Animation
       ══════════════════════════════════════════ */
    .header {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
      opacity: 0;
      transform: translateY(-20px) scale(0.9);
      animation: logoEnter 0.8s var(--ease-spring) 0.1s forwards;
    }

    .logo-icon {
      width: 2.5rem;
      height: 2.5rem;
      background: var(--primary);
      color: var(--primary-foreground);
      border-radius: var(--radius-sm);
      display: grid;
      place-items: center;
      transition: transform 0.3s var(--ease-spring), box-shadow 0.3s ease;
    }

    .logo:hover .logo-icon {
      transform: rotate(-10deg) scale(1.1);
      box-shadow: 0 8px 20px -4px rgba(13, 148, 136, 0.4);
    }

    .logo-icon svg {
      width: 1.25rem;
      height: 1.25rem;
    }

    .logo-text {
      font-size: var(--text-xl);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .tagline {
      font-size: var(--text-sm);
      color: var(--muted-foreground);
      opacity: 0;
      transform: translateY(-10px);
      animation: fadeSlideIn 0.6s var(--ease-smooth) 0.3s forwards;
    }

    /* ══════════════════════════════════════════
       Card with Entrance Animation
       ══════════════════════════════════════════ */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-6);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05),
                  0 10px 40px -10px rgba(0, 0, 0, 0.08);
      opacity: 0;
      transform: translateY(30px) scale(0.98);
      animation: cardEnter 0.7s var(--ease-out-expo) 0.2s forwards;
    }

    /* ══════════════════════════════════════════
       Input Group with Focus Animation
       ══════════════════════════════════════════ */
    .input-group {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-6);
      opacity: 0;
      animation: fadeSlideIn 0.5s var(--ease-smooth) 0.5s forwards;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    .input {
      width: 100%;
      height: 2.75rem;
      padding: 0 var(--space-4);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--background);
      color: var(--foreground);
      outline: none;
      transition: all 0.3s var(--ease-smooth);
    }

    .input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.15);
      transform: scale(1.01);
    }

    .input::placeholder {
      color: var(--muted-foreground);
      transition: opacity 0.2s ease;
    }

    .input:focus::placeholder {
      opacity: 0.5;
    }

    /* Input shake animation for empty submit */
    .input.shake {
      animation: shake 0.5s var(--ease-spring);
      border-color: var(--destructive);
    }

    /* ══════════════════════════════════════════
       Buttons with Ripple Effect
       ══════════════════════════════════════════ */
    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: var(--text-sm);
      height: 2.75rem;
      padding: 0 var(--space-4);
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.3s var(--ease-spring);
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-primary {
      background: var(--primary);
      color: var(--primary-foreground);
      box-shadow: 0 4px 12px -2px rgba(13, 148, 136, 0.4);
    }

    .btn-primary:hover {
      background: #0f766e;
      box-shadow: 0 6px 20px -2px rgba(13, 148, 136, 0.5);
    }

    /* Ripple effect */
    .btn .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      transform: scale(0);
      animation: ripple 0.6s ease-out forwards;
      pointer-events: none;
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted-foreground);
      padding: 0;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
    }

    .btn-ghost:hover {
      color: var(--foreground);
      background: var(--muted);
      transform: scale(1.1);
    }

    .btn-ghost:active {
      transform: scale(0.95);
    }

    .btn-ghost.delete:hover {
      color: var(--destructive);
      background: rgba(239, 68, 68, 0.1);
    }

    .btn svg {
      width: 1rem;
      height: 1rem;
      transition: transform 0.2s var(--ease-spring);
    }

    .btn-primary:hover svg {
      transform: rotate(90deg);
    }

    /* ══════════════════════════════════════════
       Filter Tabs with Sliding Indicator
       ══════════════════════════════════════════ */
    .filters {
      position: relative;
      display: flex;
      gap: var(--space-1);
      padding: var(--space-1);
      background: var(--muted);
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-4);
      opacity: 0;
      animation: fadeSlideIn 0.5s var(--ease-smooth) 0.6s forwards;
    }

    .filter-indicator {
      position: absolute;
      top: var(--space-1);
      left: var(--space-1);
      height: calc(100% - 0.5rem);
      background: var(--card);
      border-radius: calc(var(--radius-sm) - 2px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: all 0.4s var(--ease-spring);
      z-index: 0;
    }

    .filter-btn {
      flex: 1;
      padding: var(--space-2) var(--space-3);
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--muted-foreground);
      background: transparent;
      border: none;
      border-radius: calc(var(--radius-sm) - 2px);
      cursor: pointer;
      transition: color 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .filter-btn:hover {
      color: var(--foreground);
    }

    .filter-btn.active {
      color: var(--foreground);
    }

    /* ══════════════════════════════════════════
       Todo List with Stagger Animation
       ══════════════════════════════════════════ */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      min-height: 100px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: all 0.3s var(--ease-smooth);
      opacity: 0;
      transform: translateY(20px) scale(0.95);
    }

    .todo-item.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .todo-item:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 12px -2px rgba(13, 148, 136, 0.15);
      transform: translateX(4px);
    }

    .todo-item.completed {
      opacity: 0.6;
    }

    .todo-item.completed:hover {
      opacity: 0.8;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: var(--muted-foreground);
    }

    /* Completing animation */
    .todo-item.completing {
      animation: completeTask 0.5s var(--ease-spring) forwards;
    }

    /* Uncompleting animation */
    .todo-item.uncompleting {
      animation: uncompleteTask 0.4s var(--ease-smooth) forwards;
    }

    /* Removing animation */
    .todo-item.removing {
      animation: removeTask 0.4s var(--ease-smooth) forwards;
    }

    /* Just added animation */
    .todo-item.just-added {
      animation: addTask 0.5s var(--ease-spring) forwards;
    }

    /* ══════════════════════════════════════════
       Custom Checkbox with Satisfying Animation
       ══════════════════════════════════════════ */
    .checkbox {
      position: relative;
      width: 1.5rem;
      height: 1.5rem;
      flex-shrink: 0;
    }

    .checkbox input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      z-index: 1;
    }

    .checkbox-visual {
      width: 100%;
      height: 100%;
      border: 2px solid var(--border);
      border-radius: 50%;
      display: grid;
      place-items: center;
      transition: all 0.3s var(--ease-spring);
      position: relative;
      overflow: hidden;
    }

    .checkbox-visual::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--primary);
      border-radius: 50%;
      transform: scale(0);
      transition: transform 0.3s var(--ease-spring);
    }

    .checkbox-visual svg {
      width: 0.875rem;
      height: 0.875rem;
      color: var(--primary-foreground);
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: scale(0) rotate(-45deg);
      transition: all 0.3s var(--ease-spring);
      transition-delay: 0.1s;
    }

    .checkbox input:checked + .checkbox-visual {
      border-color: var(--primary);
    }

    .checkbox input:checked + .checkbox-visual::before {
      transform: scale(1);
    }

    .checkbox input:checked + .checkbox-visual svg {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    .checkbox:hover .checkbox-visual {
      border-color: var(--primary);
      transform: scale(1.1);
    }

    .checkbox input:focus + .checkbox-visual {
      box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.2);
    }

    /* Celebration particles */
    .checkbox-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      top: 50%;
      left: 50%;
    }

    .todo-text {
      flex: 1;
      font-size: var(--text-sm);
      transition: all 0.3s var(--ease-smooth);
    }

    .todo-actions {
      display: flex;
      gap: var(--space-1);
      opacity: 0;
      transform: translateX(10px);
      transition: all 0.2s var(--ease-smooth);
    }

    .todo-item:hover .todo-actions {
      opacity: 1;
      transform: translateX(0);
    }

    /* ══════════════════════════════════════════
       Empty State with Animation
       ══════════════════════════════════════════ */
    .empty-state {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--muted-foreground);
      opacity: 0;
      animation: fadeIn 0.5s var(--ease-smooth) forwards;
    }

    .empty-icon {
      width: 4rem;
      height: 4rem;
      margin: 0 auto var(--space-3);
      opacity: 0.4;
      animation: float 3s ease-in-out infinite;
    }

    .empty-title {
      font-size: var(--text-base);
      font-weight: 600;
      margin-bottom: var(--space-1);
    }

    .empty-description {
      font-size: var(--text-sm);
    }

    /* ══════════════════════════════════════════
       Stats with Counter Animation
       ══════════════════════════════════════════ */
    .stats {
      display: flex;
      justify-content: space-between;
      padding-top: var(--space-4);
      margin-top: var(--space-4);
      border-top: 1px solid var(--border);
      font-size: var(--text-xs);
      color: var(--muted-foreground);
      opacity: 0;
      animation: fadeSlideIn 0.5s var(--ease-smooth) 0.7s forwards;
    }

    .stats-item {
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    .stats-value {
      font-weight: 700;
      color: var(--foreground);
      display: inline-block;
      min-width: 1.5ch;
      transition: transform 0.3s var(--ease-spring);
    }

    .stats-value.updating {
      animation: countPop 0.3s var(--ease-spring);
    }

    .clear-btn {
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--muted-foreground);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      transition: all 0.2s var(--ease-smooth);
    }

    .clear-btn:hover {
      color: var(--destructive);
      background: rgba(239, 68, 68, 0.1);
    }

    .clear-btn:active {
      transform: scale(0.95);
    }

    /* ══════════════════════════════════════════
       Success Toast Notification
       ══════════════════════════════════════════ */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--foreground);
      color: var(--background);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius);
      font-size: var(--text-sm);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: var(--space-2);
      box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.3);
      opacity: 0;
      transition: all 0.4s var(--ease-spring);
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast svg {
      width: 1.125rem;
      height: 1.125rem;
      color: var(--success);
    }

    /* ══════════════════════════════════════════
       Keyframe Animations
       ══════════════════════════════════════════ */
    @keyframes logoEnter {
      0% {
        opacity: 0;
        transform: translateY(-20px) scale(0.9);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes fadeSlideIn {
      0% {
        opacity: 0;
        transform: translateY(-10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes cardEnter {
      0% {
        opacity: 0;
        transform: translateY(30px) scale(0.98);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes addTask {
      0% {
        opacity: 0;
        transform: translateY(-20px) scale(0.8);
      }
      50% {
        transform: translateY(5px) scale(1.02);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes completeTask {
      0% {
        transform: scale(1);
      }
      30% {
        transform: scale(0.97) translateX(5px);
      }
      60% {
        transform: scale(1.02);
      }
      100% {
        transform: scale(1);
        opacity: 0.6;
      }
    }

    @keyframes uncompleteTask {
      0% {
        opacity: 0.6;
      }
      50% {
        transform: scale(1.02);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes removeTask {
      0% {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateX(50px) scale(0.8);
        height: 0;
        padding: 0;
        margin: 0;
        border-width: 0;
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    @keyframes countPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes particleExplode {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(0);
        opacity: 0;
      }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <i data-lucide="check-square"></i>
        </div>
        <span class="logo-text">TaskFlow</span>
      </div>
      <p class="tagline">Stay organized, stay productive</p>
    </header>

    <!-- Main Card -->
    <main class="card">
      <!-- Input -->
      <div class="input-group">
        <div class="input-wrapper">
          <input 
            type="text" 
            class="input" 
            id="todoInput" 
            placeholder="What needs to be done?"
            autofocus
          >
        </div>
        <button class="btn btn-primary" id="addBtn">
          <i data-lucide="plus"></i>
          Add
        </button>
      </div>

      <!-- Filters -->
      <div class="filters" id="filters">
        <div class="filter-indicator" id="filterIndicator"></div>
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <!-- Todo List -->
      <div class="todo-list" id="todoList">
        <!-- Items will be rendered here -->
      </div>

      <!-- Stats -->
      <div class="stats" id="stats">
        <div class="stats-item">
          <span class="stats-value" id="activeCount">0</span>
          <span>tasks left</span>
        </div>
        <button class="clear-btn" id="clearCompleted">Clear completed</button>
      </div>
    </main>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast">
    <i data-lucide="check-circle"></i>
    <span id="toastMessage">Task added!</span>
  </div>

  <script>
    // ══════════════════════════════════════════
    // TaskFlow - Todo App with Pro Animations
    // ══════════════════════════════════════════

    // Initialize Lucide icons
    lucide.createIcons();

    // State
    let todos = JSON.parse(localStorage.getItem('taskflow-todos')) || [];
    let currentFilter = 'all';

    // DOM Elements
    const todoInput = document.getElementById('todoInput');
    const addBtn = document.getElementById('addBtn');
    const todoList = document.getElementById('todoList');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const filterIndicator = document.getElementById('filterIndicator');
    const activeCount = document.getElementById('activeCount');
    const clearCompleted = document.getElementById('clearCompleted');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');

    // ══════════════════════════════════════════
    // Animation Helpers
    // ══════════════════════════════════════════

    // Ripple effect for buttons
    function createRipple(event) {
      const button = event.currentTarget;
      const ripple = document.createElement('span');
      ripple.classList.add('ripple');
      
      const rect = button.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      const x = event.clientX - rect.left - size / 2;
      const y = event.clientY - rect.top - size / 2;
      
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      
      button.appendChild(ripple);
      
      setTimeout(() => ripple.remove(), 600);
    }

    // Show toast notification
    function showToast(message, duration = 2000) {
      toastMessage.textContent = message;
      toast.classList.add('show');
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, duration);
    }

    // Update filter indicator position
    function updateFilterIndicator() {
      const activeBtn = document.querySelector('.filter-btn.active');
      if (activeBtn && filterIndicator) {
        const btnRect = activeBtn.getBoundingClientRect();
        const parentRect = activeBtn.parentElement.getBoundingClientRect();
        
        filterIndicator.style.width = btnRect.width + 'px';
        filterIndicator.style.left = (btnRect.left - parentRect.left) + 'px';
      }
    }

    // Animate count change
    function animateCountChange() {
      activeCount.classList.add('updating');
      setTimeout(() => activeCount.classList.remove('updating'), 300);
    }

    // Create celebration particles
    function createParticles(checkbox) {
      const colors = ['#0d9488', '#f59e0b', '#22c55e', '#3b82f6', '#ec4899'];
      const particleCount = 8;
      
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        
        const angle = (i / particleCount) * 360;
        const distance = 20 + Math.random() * 15;
        const tx = Math.cos(angle * Math.PI / 180) * distance + 'px';
        const ty = Math.sin(angle * Math.PI / 180) * distance + 'px';
        
        particle.style.setProperty('--tx', tx);
        particle.style.setProperty('--ty', ty);
        particle.style.animation = `particleExplode 0.5s ease-out forwards`;
        
        checkbox.appendChild(particle);
        
        setTimeout(() => particle.remove(), 500);
      }
    }

    // Stagger animation for list items
    function staggerItems() {
      const items = todoList.querySelectorAll('.todo-item:not(.visible)');
      items.forEach((item, index) => {
        setTimeout(() => {
          item.classList.add('visible');
        }, index * 50);
      });
    }

    // ══════════════════════════════════════════
    // Core Functions
    // ══════════════════════════════════════════

    function saveTodos() {
      localStorage.setItem('taskflow-todos', JSON.stringify(todos));
    }

    function generateId() {
      return Date.now() + Math.random().toString(36).substr(2, 9);
    }

    function addTodo() {
      const text = todoInput.value.trim();
      if (!text) {
        todoInput.classList.add('shake');
        setTimeout(() => todoInput.classList.remove('shake'), 500);
        todoInput.focus();
        return;
      }

      const newTodo = {
        id: generateId(),
        text,
        completed: false,
        isNew: true
      };

      todos.unshift(newTodo);
      saveTodos();
      renderTodos();
      todoInput.value = '';
      todoInput.focus();
      showToast('Task added!');
      animateCountChange();
      
      // Remove isNew flag after animation
      setTimeout(() => {
        newTodo.isNew = false;
      }, 500);
    }

    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      const item = document.querySelector(`[data-id="${id}"]`);
      const checkbox = item?.querySelector('.checkbox');
      
      if (todo && item) {
        const wasCompleted = todo.completed;
        todo.completed = !todo.completed;
        
        if (todo.completed) {
          item.classList.add('completing');
          if (checkbox) createParticles(checkbox);
          showToast('Task completed!');
        } else {
          item.classList.add('uncompleting');
          showToast('Task restored!');
        }
        
        saveTodos();
        animateCountChange();
        
        setTimeout(() => {
          renderTodos();
        }, wasCompleted ? 400 : 500);
      }
    }

    function deleteTodo(id) {
      const item = document.querySelector(`[data-id="${id}"]`);
      if (item) {
        item.classList.add('removing');
        showToast('Task deleted!');
        animateCountChange();
        
        setTimeout(() => {
          todos = todos.filter(todo => todo.id !== id);
          saveTodos();
          renderTodos();
        }, 400);
      }
    }

    function clearCompletedTodos() {
      const completedItems = document.querySelectorAll('.todo-item.completed');
      if (completedItems.length === 0) return;
      
      completedItems.forEach((item, index) => {
        setTimeout(() => {
          item.classList.add('removing');
        }, index * 50);
      });
      
      showToast(`${completedItems.length} task${completedItems.length > 1 ? 's' : ''} cleared!`);
      
      setTimeout(() => {
        todos = todos.filter(todo => !todo.completed);
        saveTodos();
        renderTodos();
      }, completedItems.length * 50 + 400);
    }

    function getFilteredTodos() {
      switch (currentFilter) {
        case 'active':
          return todos.filter(todo => !todo.completed);
        case 'completed':
          return todos.filter(todo => todo.completed);
        default:
          return todos;
      }
    }

    function renderTodos() {
      const filtered = getFilteredTodos();
      const activeTodos = todos.filter(todo => !todo.completed).length;

      activeCount.textContent = activeTodos;

      if (filtered.length === 0) {
        const emptyMessages = {
          all: { title: 'No tasks yet', desc: 'Add your first task to get started', icon: 'clipboard-list' },
          active: { title: 'All done!', desc: 'No active tasks remaining', icon: 'party-popper' },
          completed: { title: 'Nothing completed', desc: 'Complete some tasks to see them here', icon: 'clock' }
        };
        const msg = emptyMessages[currentFilter];
        
        todoList.innerHTML = `
          <div class="empty-state">
            <i data-lucide="${msg.icon}" class="empty-icon"></i>
            <p class="empty-title">${msg.title}</p>
            <p class="empty-description">${msg.desc}</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      todoList.innerHTML = filtered.map(todo => `
        <div class="todo-item ${todo.completed ? 'completed' : ''} ${todo.isNew ? 'just-added' : ''}" data-id="${todo.id}">
          <label class="checkbox">
            <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo('${todo.id}')">
            <span class="checkbox-visual">
              <i data-lucide="check"></i>
            </span>
          </label>
          <span class="todo-text">${escapeHtml(todo.text)}</span>
          <div class="todo-actions">
            <button class="btn btn-ghost delete" onclick="deleteTodo('${todo.id}')" aria-label="Delete task">
              <i data-lucide="trash-2"></i>
            </button>
          </div>
        </div>
      `).join('');

      lucide.createIcons();
      
      // Trigger stagger animation
      requestAnimationFrame(() => {
        staggerItems();
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function setFilter(filter) {
      currentFilter = filter;
      filterBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
      });
      updateFilterIndicator();
      renderTodos();
    }

    // ══════════════════════════════════════════
    // Event Listeners
    // ══════════════════════════════════════════

    addBtn.addEventListener('click', (e) => {
      createRipple(e);
      addTodo();
    });

    todoInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTodo();
    });

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => setFilter(btn.dataset.filter));
    });

    clearCompleted.addEventListener('click', clearCompletedTodos);

    // Initialize
    renderTodos();
    
    // Set initial filter indicator position
    setTimeout(updateFilterIndicator, 100);
    
    // Update indicator on resize
    window.addEventListener('resize', updateFilterIndicator);
  </script>
</body>
</html>
